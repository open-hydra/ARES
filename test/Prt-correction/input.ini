[ARES-Parameters]
simulation-type = turbulent
iter-threshold = 7000000
newrun = .true.

[ARES-Numerics]
cfl                     = 0.2
vnn                     = 0.2
time-scheme             = RK2
time-accurate           = false
integration-variables   = prec
space-reconstruction    = MUSCL
flux-limiter            = minmod
riemann-solver          = HLLC Prec
preconditioning-Uref    = 120.0
preconditioning-eps-min = 0.10

[ARES-IO]
sol-diter = 50000
shell-diter = 1000

[ARES-RANS]
turbulence-model = SA-rough
Prt = 0.9
Prt-correction = .true.

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Daxi
axis = 1.d-8

[GRIB-Block1]
pivot =  0.0 0.0 0.0
length = 0.240
height = 0.001
nx = 120
ny = 28
strx = U 1.0
stry = L 1.2

[ICB-Block1]
p = 18.0e5
h = 1.1e5
u = 12.0
mit = 1.0e-10

[BCB-Block1]
face1 = inflow
face2 = outflow
face3 = sym
face4 = qw
face5 = axisym
face6 = axisym

[inflow]
type = inlet
g = 12182.2d0
T = 320.0
mit = 1.d-10

[outflow]
type = outlet
p = 10.0d5

[sym]
type = symmetry

[axisym]
type = axisymmetric

[qw]
type = wall
q = 3.0d6
ks = 1.60d-4
