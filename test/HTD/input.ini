[ARES-Parameters]
simulation-type = turbulent
iter-threshold = 6000000
newrun = .true.

[ARES-Numerics]
cfl                   = 0.3
vnn                   = 0.3
time-scheme           = RK3
time-accurate         = false
integration-variables = prec
space-reconstruction  = MUSCL
flux-limiter          = vanleer
riemann-solver        = HLLC Prec
preconditioning = .true.
preconditioning-Uref = 600.0
preconditioning-eps-min = 0.1

[ARES-IO]
sol-diter = 10000
shell-diter = 500

[ARES-RANS]
turbulence-model = SA
Prt = 0.9

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Daxi
axis = 1.d-8

[GRIB-Block1]
pivot =  -0.1524 0.0 0.0
length = 0.1524
height = 0.002794
nx = 30
ny = 96
strx = U 1.0
stry = L 1.08

[GRIB-Block2]
pivot = 0.0 0.0 0.0
length = 0.4572
height = 0.002794
nx = 100
ny = 96
strx = U 1.0
stry = L 1.08

[GPB-Phase1]
type = real-fluid
name = parahydrogen 
fluid = parahydrogen
pmin = 30.0e5
pmax = 80.0e5
Tmin = 25.0e0
Tmax = 800.0e0
NP = 800
NH = 800

[ICB-Block1]
p = 48.0d5
h = 2.20d3
u = 100.0d0
mit = 1.d-6

[ICB-Block2]
p = 48.0d5
h = 2.2d3
u = 100.0d0
mit = 1.d-6

[BCB-Block1]
face1 = inflow
face2 = connection
face3 = sym
face4 = adiabatic
face5 = axisym
face6 = axisym

[BCB-Block2]
face1 = connection
face2 = outflow
face3 = sym
face4 = qw
face5 = axisym
face6 = axisym

[inflow]
type = inlet
g = 2741.0
T = 31.39
mit = 1.d-10

[outflow]
type = outlet
p = 46.11d5

[sym]
type = symmetry

[axisym]
type = axisymmetric

[adiabatic]
type = wall
q = 0.0

[connection]
type = connection

[qw]
type = wall
q = 4.766d6
