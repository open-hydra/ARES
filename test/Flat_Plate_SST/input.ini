[ARES-Parameters]
simulation-type = turbulent
iter-threshold = 700000
newrun = .true.

[ARES-Numerics]
cfl                   = 0.6
vnn                   = 0.6
time-scheme           = RK3
time-accurate         = false
integration-variables = prim
space-reconstruction  = MUSCL
flux-limiter          = vanleer
riemann-solver        = HLLC

[ARES-IO]
sol-diter = 50000
shell-diter = 1000
sol-variables = transport

[ARES-RANS]
turbulence-model = SST
Prt = 0.85

[GPB-Phase1]
type = real-fluid
name = air
fluid = air
pmin = 0.50e5
pmax = 2.0e5
Tmin = 500.0
Tmax = 600.0
NP = 200
NH = 200

[ICB-Block1]
p = 1.0e5
T = 555.
u = 100.0
kappa = 2.25e-3
omega = 6250.0

[BCB-Block1]
face1 = inflow
face2 = outflow
face3 = wall
face4 = symmetry

[wall]
direction = x
patch1 = symmetry
range1 = -2. 0.
patch2 = adiabatic
range2 = 0. 2.

[inflow]
type = inlet
g = 59.29
T = 555.
kappa = 2.25d-3
omega = 6250.0

[outflow]
type = outlet
p = 1.0e5

[symmetry]
type = symmetry

[adiabatic]
type = wall
q = 0.0
