[ARES-Parameters]
simulation-type = turbulent
iter-threshold = 200000
newrun = .true.

[ARES-Numerics]
cfl                   = 0.4
vnn                   = 0.4
time-scheme           = RK2
time-accurate         = false
integration-variables = prim
space-reconstruction  = MUSCL
flux-limiter          = minmod
riemann-solver        = HLLC

[ARES-IO]
sol-diter = 100000
shell-diter = 1000
sol-variables = transport

[ARES-RANS]
turbulence-model = SA
Prt = 0.85

[GPB-Phase1]
type = real-fluid
name = air
fluid = air
pmin = 0.50e5
pmax = 2.0e5
Tmin = 500.0
Tmax = 600.0
NP = 200
NH = 200

[ICB-Block1]
p = 1.0d5
T = 555.00
u = 250.0d0
mit = 1.0d-10

[BCB-Block1]
face1 = inflow
face2 = outflow
face3 = wall
face4 = symmetry

[wall]
direction = x
patch1 = symmetry
range1 = -2. 0.
patch2 = adiabatic
range2 = 0. 2.

[inflow]
type = inlet
g = 145.85
T = 555.
mit = 1.0d-10

[outflow]
type = outlet
p = 1.0d5

[symmetry]
type = symmetry

[adiabatic]
type = wall
q = 0.0
